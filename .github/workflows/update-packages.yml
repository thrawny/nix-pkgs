name: Update packages

on:
  schedule:
    - cron: "0 12 * * *" # Daily at noon UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Build and push current packages to Cachix even when there are no updates"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.summary.outputs.needs_build }}
      needs_commit: ${{ steps.update.outputs.needs_update }}
      commit_message: ${{ steps.update.outputs.commit_message }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Check stable npm releases
        id: update
        run: nix develop -c scripts/update-packages.py

      - name: Summarize update
        id: summary
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          NEEDS_UPDATE: ${{ steps.update.outputs.needs_update }}
        run: |
          set -euo pipefail
          needs_build=false
          if [ "$NEEDS_UPDATE" = "true" ] || [ "$FORCE" = "true" ]; then
            needs_build=true
          fi
          echo "needs_build=$needs_build" >> "$GITHUB_OUTPUT"

      - name: Upload update candidate
        if: steps.update.outputs.needs_update == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: package-update-candidate
          if-no-files-found: error
          path: packages

  build-linux:
    needs: prepare
    if: needs.prepare.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download update candidate
        if: needs.prepare.outputs.needs_commit == 'true'
        uses: actions/download-artifact@v8.0.1
        with:
          name: package-update-candidate
          path: packages

      - name: Enable unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: thrawny
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build and push Linux packages
        run: |
          set -euo pipefail
          nix build .#t3code .#firecrawl-cli --print-out-paths | cachix push thrawny

      - name: Smoke test Linux packages
        run: |
          set -euo pipefail
          nix run .#t3code -- --version
          nix run .#firecrawl-cli -- --version

  commit-update:
    needs:
      - prepare
      - build-linux
    if: needs.prepare.outputs.needs_commit == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download update candidate
        uses: actions/download-artifact@v8.0.1
        with:
          name: package-update-candidate
          path: packages

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit_message: ${{ needs.prepare.outputs.commit_message }}
